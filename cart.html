<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Cart | Brew Haven Cafe</title>
    <link rel="icon" type="image/png" href="images/favicon.jpg">

    <link rel="stylesheet" href="style.css">

    <style>

        .cart-banner{
            height: 40vh;

            background:
            linear-gradient(rgba(0,0,0,0.5),
            rgba(0,0,0,0.5)),

            url('images/menu.jpg');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            text-align: center;
        }

        .cart-banner h1{
            font-size: 55px;
        }

        .cart-page{
            padding: 80px 10%;
        }

        .cart-container{
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .cart-items{
            flex: 2;
        }

        .cart-card{
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cart-card img{
            width: 150px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-details{
            flex: 1;
        }

        .cart-details h3{
            margin-bottom: 10px;
        }

        .price{
            color: #e67e22;
            font-weight: bold;
            font-size: 20px;
        }

        .remove-btn{
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: crimson;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .summary{
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            height: fit-content;

            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary h2{
            margin-bottom: 25px;
            color: #6f4e37;
        }

        .summary p{
            margin-bottom: 15px;
            font-size: 18px;
        }

        .checkout-btn{
            width: 100%;
            padding: 14px;
            border: none;
            background: #2c1d14;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .checkout-btn:hover{
            background: #6f4e37;
        }

        @media(max-width: 768px){

            .cart-container{
                flex-direction: column;
            }

            .cart-card{
                flex-direction: column;
            }

            .cart-card img{
                width: 100%;
                height: 220px;
            }

            .cart-banner h1{
                font-size: 40px;
            }

        }
    </style>

</head>

<body>

     <!-- Navbar -->
    <nav class="navbar">

        <div class="logo">

            <img src="images/Logo.png" alt="">

            <h1>Brew Haven</h1>

        </div>

        <!-- Hamburger -->

        <div class="hamburger" id="hamburger">
            ☰
        </div>

        <!-- Nav Links -->

        <ul id="navLinks">

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="menu.html">Menu</a></li>

            <li><a href="contact.html">Contact</a></li>

            <li>
                <a href="cart.html"
                id="cart"
                class="active">

                Cart 🛒

                </a>
            </li>

        </ul>

    </nav>

    <!-- Banner -->

    <section class="cart-banner">

        <div>
            <h1>Your Cart</h1>
            <p>Your favorite items are here</p>
        </div>

    </section>

    <!-- Cart Section -->

    <section class="cart-page">

        <div class="cart-container">

            <!-- Cart Items -->

            <div class="cart-items" id="cartItems">

            </div>

            <!-- Summary -->

            <div class="summary">

                <h2>Order Summary</h2>

                <p id="itemCount">Items: 0</p>

                <p id="totalPrice">Total: ₹0</p>

                <button class="checkout-btn">
                    Proceed to Checkout
                </button>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>
        <p>© 2026 Brew Haven Cafe</p>
    </footer>
<script>

const cartItemsContainer =
document.getElementById("cartItems");

const itemCount =
document.getElementById("itemCount");

const totalPrice =
document.getElementById("totalPrice");

cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

let totalItems = 0;

cart.forEach(function(item){

    totalItems += item.quantity;

});

itemCount.innerText =
"Items: " + totalItems;

cart.forEach(function(item, index){

    total += Number(item.price) * item.quantity;

    cartItemsContainer.innerHTML += `

    <div class="cart-card">

        <img src="${item.image}" alt="">

        <div class="cart-details">

            <h3>${item.name}</h3>

            <p>
            Quantity: ${item.quantity}
            </p>

            <p class="price">
            ₹${item.price * item.quantity}
            </p>

            <button class="remove-btn"
            onclick="removeItem(${index})">

            Remove

            </button>

        </div>

    </div>

    `;

});

totalPrice.innerText = "Total: ₹" + total;

function removeItem(index){

    cart.splice(index, 1);

    localStorage.setItem("cart",
    JSON.stringify(cart));

    location.reload();

}

</script>
      
   <script>
        function updateCartNavbar() {

            cart = JSON.parse(localStorage.getItem("cart")) || [];

            let total = 0;

            cart.forEach(item => {
                total += item.quantity;
            });

            let cartLink = document.getElementById("cart");

            if (cartLink) {
            cartLink.textContent = `Cart(${total}) 🛒`;
            }
        }

// run on page load
        document.addEventListener("DOMContentLoaded", updateCartNavbar);

// also update instantly when storage changes (VERY IMPORTANT)
        window.addEventListener("storage", updateCartNavbar);
    </script>
    <script src="script.js"></script>    
</body>
</html>
